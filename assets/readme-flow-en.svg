<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Game Account Select workflow diagram</title>
  <desc id="desc">A workflow diagram from buyer intent to ranked account recommendations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#131A2A"/>
    </linearGradient>
    <linearGradient id="edge" x1="120" y1="260" x2="1280" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58D6B5"/>
      <stop offset="0.5" stop-color="#F0C96A"/>
      <stop offset="1" stop-color="#E27D60"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="1400" height="520" rx="28" fill="url(#bg)"/>
  <path d="M164 260H1238" stroke="url(#edge)" stroke-width="8" stroke-linecap="round" opacity="0.82"/>
  <path d="M1238 260L1214 244M1238 260L1214 276" stroke="#E27D60" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g filter="url(#shadow)" transform="translate(80 142)">
      <rect width="200" height="236" rx="20" fill="#101624" stroke="#58D6B5" stroke-opacity="0.46"/>
      <circle cx="100" cy="62" r="28" fill="#58D6B5" fill-opacity="0.16" stroke="#58D6B5" stroke-width="3"/>
      <text x="100" y="70" text-anchor="middle" fill="#9BE6D2" font-size="28" font-weight="760">01</text>
      <text x="100" y="122" text-anchor="middle" fill="#F8FAFC" font-size="21" font-weight="760">Buyer intent</text>
      <text x="100" y="158" text-anchor="middle" fill="#CAD5E2" font-size="15">game, budget, server</text>
      <text x="100" y="184" text-anchor="middle" fill="#CAD5E2" font-size="15">targets and risk appetite</text>
    </g>
    <g filter="url(#shadow)" transform="translate(315 142)">
      <rect width="200" height="236" rx="20" fill="#101624" stroke="#78C7FF" stroke-opacity="0.4"/>
      <circle cx="100" cy="62" r="28" fill="#78C7FF" fill-opacity="0.16" stroke="#78C7FF" stroke-width="3"/>
      <text x="100" y="70" text-anchor="middle" fill="#A9DDFF" font-size="28" font-weight="760">02</text>
      <text x="100" y="122" text-anchor="middle" fill="#F8FAFC" font-size="21" font-weight="760">Listing read</text>
      <text x="100" y="158" text-anchor="middle" fill="#CAD5E2" font-size="15">pages, screenshots, OCR</text>
      <text x="100" y="184" text-anchor="middle" fill="#CAD5E2" font-size="15">seller claims structured</text>
    </g>
    <g filter="url(#shadow)" transform="translate(550 142)">
      <rect width="200" height="236" rx="20" fill="#101624" stroke="#F0C96A" stroke-opacity="0.46"/>
      <circle cx="100" cy="62" r="28" fill="#F0C96A" fill-opacity="0.16" stroke="#F0C96A" stroke-width="3"/>
      <text x="100" y="70" text-anchor="middle" fill="#F8D987" font-size="28" font-weight="760">03</text>
      <text x="100" y="122" text-anchor="middle" fill="#F8FAFC" font-size="21" font-weight="760">Guide signal</text>
      <text x="100" y="158" text-anchor="middle" fill="#CAD5E2" font-size="15">community consensus</text>
      <text x="100" y="184" text-anchor="middle" fill="#CAD5E2" font-size="15">version-sensitive value</text>
    </g>
    <g filter="url(#shadow)" transform="translate(785 142)">
      <rect width="200" height="236" rx="20" fill="#101624" stroke="#E27D60" stroke-opacity="0.48"/>
      <circle cx="100" cy="62" r="28" fill="#E27D60" fill-opacity="0.16" stroke="#E27D60" stroke-width="3"/>
      <text x="100" y="70" text-anchor="middle" fill="#F3AA96" font-size="28" font-weight="760">04</text>
      <text x="100" y="122" text-anchor="middle" fill="#F8FAFC" font-size="21" font-weight="760">Value + risk</text>
      <text x="100" y="158" text-anchor="middle" fill="#CAD5E2" font-size="15">assets, resources, price</text>
      <text x="100" y="184" text-anchor="middle" fill="#CAD5E2" font-size="15">binding and recovery risk</text>
    </g>
    <g filter="url(#shadow)" transform="translate(1020 142)">
      <rect width="200" height="236" rx="20" fill="#101624" stroke="#B78CFF" stroke-opacity="0.46"/>
      <circle cx="100" cy="62" r="28" fill="#B78CFF" fill-opacity="0.16" stroke="#B78CFF" stroke-width="3"/>
      <text x="100" y="70" text-anchor="middle" fill="#D8C5FF" font-size="28" font-weight="760">05</text>
      <text x="100" y="122" text-anchor="middle" fill="#F8FAFC" font-size="21" font-weight="760">Recommendation</text>
      <text x="100" y="158" text-anchor="middle" fill="#CAD5E2" font-size="15">ranked shortlist</text>
      <text x="100" y="184" text-anchor="middle" fill="#CAD5E2" font-size="15">gaps and next checks</text>
    </g>
  </g>
</svg>
